<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PINIT — Platforma</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="/maps.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#1a7a34;--brand-d:#0f4f21;--brand-l:#e8f5ec;
  --red:#ff3b30;--orange:#ff9500;--blue:#007aff;--purple:#5856d6;--teal:#30b0c7;--yellow:#ffcc00;--pink:#ff2d55;
  --redl:#ffece9;--orangel:#fff3e0;--bluel:#e9f1ff;--purplel:#ecebfb;--greenl:#e7f7ec;
  --bg:#eef0f4;--card:#ffffff;--glass:rgba(255,255,255,.72);--glass2:rgba(255,255,255,.55);
  --ink:#1c1c1e;--ink2:#3c3c43;--ink3:#8e8e93;--ink4:#aeaeb2;
  --sep:rgba(60,60,67,.13);--sep2:rgba(60,60,67,.07);
  --fn:'Inter',-apple-system,BlinkMacSystemFont,system-ui,'Segoe UI',Roboto,sans-serif;
  --r:22px;--r2:16px;--r3:12px;
  --sh:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.06);
  --sh2:0 2px 8px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:var(--fn);color:var(--ink);font-size:14px;overflow:hidden;
  background:
    radial-gradient(1100px 700px at 85% -8%,rgba(0,122,255,.10),transparent 60%),
    radial-gradient(1000px 700px at -5% 105%,rgba(26,122,52,.12),transparent 55%),
    radial-gradient(800px 600px at 50% 120%,rgba(88,86,214,.08),transparent 60%),
    var(--bg);
  -webkit-font-smoothing:antialiased;letter-spacing:-.01em;}
button,select,input{font-family:var(--fn);cursor:pointer;color:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.14);border-radius:4px;}
.app{display:flex;height:100vh;padding:14px;gap:14px;}

/* ───── SIDEBAR (frosted glass) ───── */
.side{width:250px;flex-shrink:0;background:var(--glass);backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);
  border:.5px solid rgba(255,255,255,.7);border-radius:26px;box-shadow:var(--sh);display:flex;flex-direction:column;padding:18px 14px;overflow-y:auto;}
.logo{display:flex;align-items:center;gap:11px;padding:4px 8px 16px;}
.logo-mark{width:38px;height:38px;border-radius:12px;background:linear-gradient(160deg,#22a845,#0f4f21);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(26,122,52,.4);}
.logo-mark svg{width:21px;height:21px;fill:#fff;}
.logo-t{font-size:19px;font-weight:700;letter-spacing:-.5px;}
.logo-s{font-size:11px;color:var(--ink3);margin-top:0;font-weight:500;}

/* segmented service switcher */
.seg{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:rgba(118,118,128,.12);border-radius:13px;padding:3px;margin:4px 4px 16px;}
.seg-btn{border:none;background:none;border-radius:10px;padding:8px 4px;font-size:11.5px;font-weight:600;color:var(--ink2);display:flex;align-items:center;justify-content:center;gap:5px;transition:all .18s;}
.seg-btn.on{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.12);color:var(--ink);}
.seg-btn .dot{width:7px;height:7px;border-radius:50%;}

.nav-lbl{font-size:11px;font-weight:600;color:var(--ink4);text-transform:uppercase;letter-spacing:.4px;padding:10px 12px 6px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:13px;color:var(--ink2);font-size:14px;font-weight:500;border:none;background:none;width:100%;text-align:left;transition:all .15s;margin-bottom:2px;}
.nav-item svg{width:19px;height:19px;fill:currentColor;flex-shrink:0;opacity:.85;}
.nav-item:hover{background:rgba(118,118,128,.1);}
.nav-item.on{background:var(--brand);color:#fff;box-shadow:0 4px 12px rgba(26,122,52,.35);}
.nav-item.on svg{opacity:1;}
.nav-badge{margin-left:auto;font-size:11px;font-weight:700;background:var(--red);color:#fff;border-radius:10px;padding:1px 7px;min-width:20px;text-align:center;}
.nav-item.on .nav-badge{background:rgba(255,255,255,.28);}
.side-foot{margin-top:auto;padding:12px 10px 4px;display:flex;align-items:center;gap:10px;}
.side-foot-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(140deg,#007aff,#5856d6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;}
.side-foot-n{font-size:13px;font-weight:600;}
.side-foot-r{font-size:11px;color:var(--ink3);}

/* ───── MAIN ───── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;gap:14px;position:relative;}
#driveFrame{position:absolute;inset:0;width:100%;height:100%;border:none;border-radius:var(--r2,16px);background:var(--bg,#eef0f4);z-index:5;}
#driveFrame[hidden]{display:none;}
.topbar{height:62px;background:var(--glass);backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);
  border:.5px solid rgba(255,255,255,.7);border-radius:22px;box-shadow:var(--sh2);display:flex;align-items:center;padding:0 22px;gap:14px;flex-shrink:0;}
.tb-title{font-size:20px;font-weight:700;letter-spacing:-.6px;}
.tb-sub{font-size:12px;color:var(--ink3);margin-top:0;font-weight:500;}
.tb-sp{flex:1;}
.pill-sel{background:rgba(118,118,128,.12);border:none;border-radius:12px;padding:9px 14px;font-size:13px;font-weight:600;color:var(--ink2);outline:none;}
.btn{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:13px;padding:10px 16px;font-size:13px;font-weight:600;transition:all .15s;}
.btn svg{width:16px;height:16px;fill:currentColor;}
.btn.primary{background:var(--brand);color:#fff;box-shadow:0 4px 12px rgba(26,122,52,.3);}
.btn.primary:hover{background:var(--brand-d);}
.btn.ghost{background:rgba(118,118,128,.12);color:var(--ink2);}
.btn.ghost:hover{background:rgba(118,118,128,.2);}

.body{flex:1;overflow-y:auto;padding-right:2px;}
.screen{display:none;}
.screen.on{display:block;animation:rise .3s cubic-bezier(.2,.7,.3,1);}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* cards */
.card{background:var(--card);border:.5px solid var(--sep2);border-radius:var(--r);box-shadow:var(--sh);padding:20px 22px;}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;}
.card-t{font-size:16px;font-weight:700;letter-spacing:-.3px;}
.card-badge{font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;background:var(--brand-l);color:var(--brand-d);}
.lead{font-size:13.5px;color:var(--ink2);line-height:1.55;margin-bottom:18px;max-width:700px;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px;}
.kpi{background:var(--card);border:.5px solid var(--sep2);border-radius:var(--r);box-shadow:var(--sh);padding:18px 20px;}
.kpi-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.kpi-ic{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;}
.kpi-ic svg{width:19px;height:19px;}
.kpi-lbl{font-size:12.5px;color:var(--ink3);font-weight:600;}
.kpi-val{font-size:32px;font-weight:700;letter-spacing:-1.2px;line-height:1;}
.kpi-val small{font-size:16px;color:var(--ink3);font-weight:600;}
.kpi-delta{font-size:12px;font-weight:600;margin-top:9px;}
.up{color:var(--brand);}.down{color:var(--red);}.flat{color:var(--ink3);}

.grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;margin-bottom:14px;}
.grid2b{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.chart-box{position:relative;height:240px;}
.chart-box.sm{height:210px;}

/* task rows */
.task{display:flex;align-items:center;gap:13px;padding:13px 14px;border-radius:var(--r2);border:.5px solid var(--sep2);margin-bottom:9px;background:#fff;transition:all .15s;}
.task:hover{box-shadow:var(--sh2);transform:translateY(-1px);}
.task-ic{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.task-ic svg{width:21px;height:21px;}
.task-main{flex:1;min-width:0;}
.task-t{font-size:14px;font-weight:600;letter-spacing:-.2px;}
.task-m{font-size:12px;color:var(--ink3);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.chip.urgent{background:var(--redl);color:#c4271d;}
.chip.med{background:var(--orangel);color:#9a5a00;}
.chip.low{background:rgba(118,118,128,.14);color:var(--ink2);}
.chip.new{background:var(--bluel);color:#0058c4;}
.chip.prog{background:var(--orangel);color:#9a5a00;}
.chip.done{background:var(--greenl);color:var(--brand-d);}
.votes{font-size:11px;color:var(--ink3);font-weight:600;display:flex;align-items:center;gap:3px;}
.task-act{display:flex;gap:7px;flex-shrink:0;}
.mini-btn{border:none;border-radius:11px;padding:8px 13px;font-size:12.5px;font-weight:600;background:var(--brand);color:#fff;transition:all .15s;}
.mini-btn:hover{background:var(--brand-d);}
.mini-btn.sec{background:rgba(118,118,128,.14);color:var(--ink2);}
.mini-btn.sec:hover{background:rgba(118,118,128,.24);}

/* worker mini */
.wk{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:var(--r2);border:.5px solid var(--sep2);margin-bottom:8px;background:#fff;}
.wk-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
.wk-n{font-size:13.5px;font-weight:600;}
.wk-r{font-size:11.5px;color:var(--ink3);}
.wk-st{margin-left:auto;font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;}
.st-busy{background:var(--orangel);color:#9a5a00;}
.st-free{background:var(--greenl);color:var(--brand-d);}
.st-off{background:rgba(118,118,128,.14);color:var(--ink3);}

/* table */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px;text-align:left;padding:10px 12px;border-bottom:1px solid var(--sep);white-space:nowrap;}
td{font-size:13px;padding:13px 12px;border-bottom:1px solid var(--sep2);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
.tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.tag.ok{background:var(--greenl);color:var(--brand-d);}
.tag.warn{background:var(--orangel);color:#9a5a00;}
.tag.bad{background:var(--redl);color:#c4271d;}

/* SLA alarms */
.alarm{display:flex;align-items:center;gap:14px;padding:15px 16px;border-radius:var(--r2);margin-bottom:10px;border:.5px solid var(--sep2);background:#fff;position:relative;overflow:hidden;}
.alarm::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;}
.alarm.over::before{background:var(--red);}
.alarm.crit::before{background:var(--red);}
.alarm.warn::before{background:var(--orange);}
.alarm.ok::before{background:var(--brand);}
.alarm.crit{animation:apulse 2s infinite;}
@keyframes apulse{0%,100%{box-shadow:0 0 0 0 rgba(255,59,48,.18)}50%{box-shadow:0 0 0 6px rgba(255,59,48,0)}}
.alarm-time{font-variant-numeric:tabular-nums;font-size:20px;font-weight:700;letter-spacing:-.5px;width:96px;flex-shrink:0;}
.alarm.over .alarm-time,.alarm.crit .alarm-time{color:var(--red);}
.alarm.warn .alarm-time{color:var(--orange);}
.alarm.ok .alarm-time{color:var(--brand);}
.alarm-main{flex:1;min-width:0;}
.alarm-t{font-size:14px;font-weight:600;}
.alarm-m{font-size:12px;color:var(--ink3);margin-top:2px;}

/* live map */
.map-wrap{position:relative;border-radius:var(--r);overflow:hidden;height:440px;border:.5px solid var(--sep2);background:linear-gradient(160deg,#dde7f0,#e8eef4);}
.map-svg{width:100%;height:100%;display:block;}
.wpin{position:absolute;transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .15s;z-index:2;}
.wpin:hover{transform:translate(-50%,-100%) scale(1.08);z-index:5;}
.wpin-head{width:38px;height:38px;border-radius:50% 50% 50% 4px;transform:rotate(45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.25);border:2.5px solid #fff;}
.wpin-head span{transform:rotate(-45deg);font-size:12px;font-weight:800;color:#fff;}
.wpin-lbl{margin-top:7px;font-size:10px;font-weight:700;background:#fff;padding:2px 7px;border-radius:7px;box-shadow:0 2px 6px rgba(0,0,0,.15);white-space:nowrap;}
.map-legend{position:absolute;bottom:14px;left:14px;background:var(--glass);backdrop-filter:blur(20px);border-radius:14px;padding:11px 14px;box-shadow:var(--sh2);display:flex;gap:16px;}
.lg-item{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--ink2);}
.lg-dot{width:9px;height:9px;border-radius:50%;}

/* shift planner */
.shift-grid{display:grid;grid-template-columns:150px repeat(7,1fr);gap:6px;}
.sh-head{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px;padding:6px;text-align:center;}
.sh-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:9px;padding:6px 4px;}
.sh-cell{border-radius:11px;padding:9px 4px;text-align:center;font-size:11px;font-weight:700;border:.5px solid var(--sep2);transition:all .12s;}
.sh-cell:hover{transform:scale(1.05);}
.sh-J{background:var(--orangel);color:#9a5a00;}
.sh-P{background:var(--bluel);color:#0058c4;}
.sh-N{background:var(--purplel);color:#3b35a8;}
.sh-O{background:rgba(118,118,128,.1);color:var(--ink4);}
.sh-avail{font-size:11px;font-weight:700;text-align:center;padding-top:6px;color:var(--brand);}

/* perf bars */
.pf-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--sep2);}
.pf-row:last-child{border-bottom:none;}
.pf-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
.pf-name{font-size:13px;font-weight:600;width:140px;flex-shrink:0;}
.pf-bar-bg{flex:1;height:9px;border-radius:5px;background:var(--bg);overflow:hidden;}
.pf-bar{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--brand),#22a845);}
.pf-val{font-size:13px;font-weight:700;width:42px;text-align:right;}

/* zones / dist / csat (reused from grad) */
.zone-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.zone{border-radius:14px;padding:13px 14px;border:.5px solid var(--sep2);}
.zone-n{font-size:13px;font-weight:700;}
.zone-c{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-top:4px;}
.zone-s{font-size:11px;color:var(--ink3);}
.note{display:flex;gap:11px;background:var(--orangel);border:.5px solid rgba(255,149,0,.25);border-radius:14px;padding:13px 15px;}
.note svg{width:18px;height:18px;fill:var(--orange);flex-shrink:0;margin-top:1px;}
.note-t{font-size:12.5px;font-weight:700;color:#8a5300;}
.note-b{font-size:12px;color:#8a5300;line-height:1.5;margin-top:2px;opacity:.92;}
.csat-hero{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px;}
.csat-big{background:var(--card);border:.5px solid var(--sep2);border-radius:var(--r);box-shadow:var(--sh);padding:22px;text-align:center;}
.csat-score{font-size:46px;font-weight:700;letter-spacing:-2px;line-height:1;}
.csat-score small{font-size:20px;color:var(--ink3);}
.csat-lbl{font-size:13px;font-weight:600;color:var(--ink2);margin-top:6px;}
.csat-meta{font-size:11px;color:var(--ink3);margin-top:5px;}
.stars{color:#ffb300;font-size:20px;letter-spacing:2px;margin-top:8px;}
.dist-row{display:flex;align-items:center;gap:12px;margin-bottom:9px;}
.dist-star{font-size:12px;font-weight:600;width:42px;color:var(--ink2);}
.dist-bg{flex:1;height:14px;border-radius:7px;background:var(--bg);overflow:hidden;}
.dist-fill{height:100%;border-radius:7px;background:#ffb300;}
.dist-n{font-size:12px;font-weight:600;width:58px;text-align:right;color:var(--ink2);}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.28);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.on{display:flex;animation:fade .2s;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--glass);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border:.5px solid rgba(255,255,255,.8);border-radius:26px;box-shadow:0 30px 80px rgba(0,0,0,.3);width:460px;max-width:100%;max-height:86vh;overflow-y:auto;padding:24px;animation:pop .28s cubic-bezier(.2,.8,.3,1);}
@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.modal-h{font-size:19px;font-weight:700;letter-spacing:-.4px;margin-bottom:4px;}
.modal-s{font-size:13px;color:var(--ink3);margin-bottom:18px;}
.opt{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r2);border:.5px solid var(--sep);margin-bottom:8px;background:#fff;transition:all .14s;}
.opt:hover{border-color:var(--brand);background:var(--brand-l);}
.opt.dim{opacity:.5;pointer-events:none;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(28,28,30,.92);backdrop-filter:blur(20px);color:#fff;padding:13px 22px;border-radius:16px;font-size:13.5px;font-weight:600;box-shadow:0 12px 32px rgba(0,0,0,.3);z-index:200;opacity:0;transition:all .3s cubic-bezier(.2,.8,.3,1);}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1;}
.empty{text-align:center;color:var(--ink3);padding:40px 0;}
.empty-e{font-size:40px;margin-bottom:10px;}
@media print{.side,.topbar{display:none;}.app{padding:0;}.body{overflow:visible;}.screen{display:block!important;}.card,.kpi{box-shadow:none;break-inside:avoid;}}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="side">
    <div class="logo">
      <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/></svg></div>
      <div><div class="logo-t">PINIT</div><div class="logo-s">Platforma <span id="pinitVer" style="opacity:.55;font-size:9px;"></span></div></div>
    </div>

    <div class="seg" id="svcSeg">
      <button class="seg-btn on" data-svc="putevi" onclick="setSvc('putevi',this)"><span class="dot" style="background:#f59000"></span>Putevi</button>
      <button class="seg-btn" data-svc="voda" onclick="setSvc('voda',this)"><span class="dot" style="background:#0891b2"></span>Vodovod</button>

function openAssign(oid){
  const o=getO(oid);if(!o)return;
  const free=workers().filter(w=>w.status!=='off');
  $('modal').innerHTML=`<div class="modal-h">Dodijeli zadatak</div><div class="modal-s">${o.id} · ${o.addr}</div>
    ${free.length?free.map(w=>`<div class="opt" onclick="assign('${oid}','${w.id}')"><div class="wk-av" style="background:${w.bg};color:${w.tc}">${w.av}</div><div style="flex:1"><div class="wk-n">${w.name}</div><div class="wk-r">${w.role} · ${w.loc}</div></div><span class="wk-st st-${w.status}">${w.status==='free'?'Slobodan':w.tasks+' zad.'}</span></div>`).join('')
    :`<div style="padding:18px 6px;color:var(--ink3);font-size:13.5px;line-height:1.55;text-align:center">U odjelu <b>${D().label}</b> još nema nijednog radnika.<br>Dodaj prvog pa mu dodijeli ovaj zadatak.</div>
     <button class="btn primary" style="width:100%;justify-content:center;margin-top:4px" onclick="closeModal();if(window.pinitAddWorker)pinitAddWorker()">➕ Dodaj radnika</button>`}
    <button class="btn ghost" style="width:100%;justify-content:center;margin-top:8px" onclick="closeModal()">Odustani</button>`;
  openModal();
}
function assign(oid,wid){
  const o=getO(oid),w=getW(wid);if(!o||!w)return;
  o.worker=wid;o.status='prog';w.tasks++;if(w.status==='free')w.status='busy';
  closeModal();renderDispGroup();toast('✓ Dodijeljeno: '+w.name);
}
function markDone(oid){
  const o=getO(oid);if(!o)return;
  o.status='done';if(!o.cost)o.cost=80+Math.floor(Math.random()*200);
  if(o.worker){const w=getW(o.worker);if(w){w.tasks=Math.max(0,w.tasks-1);w.done++;if(w.tasks===0)w.status='free';}}
  renderDispGroup();toast('✓ Zadatak završen');
}
function openWorker(wid){
  const w=getW(wid);if(!w)return;

      ${ANOMALIES.map(a=>`<div class="alarm ${sevMap[a.sev]}"><div style="width:90px;flex-shrink:0;text-align:center"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:${a.sev==='high'?'var(--red)':a.sev==='med'?'var(--orange)':'var(--brand)'}">${a.sev==='high'?'Visok':a.sev==='med'?'Srednji':'Nizak'}</div></div><div class="alarm-main"><div class="alarm-t">${a.cat} · ${a.zone}</div><div class="alarm-m">${a.txt}</div></div><div style="font-size:12px;font-weight:600;color:var(--ink2);max-width:160px;text-align:right">→ ${a.act}</div></div>`).join('')}

    <div class="note" style="margin-top:14px"><svg viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2zm0-4h-2v-4h2z"/></svg>
      <div><div class="note-t">Kako koristiti prognoze</div><div class="note-b">Projekcije su procjene iz sezonskih obrazaca, ne garancije. Koristi ih za <b>raspored ekipa i nabavku materijala</b>, ali svaki prediktivni model provjeri stvarnim ishodima na terenu prije nego mu potpuno vjeruješ — modeli znaju i pogriješiti.</div></div></div>`;
  setTimeout(()=>{
    if(gcharts.fc)gcharts.fc.destroy();
    gcharts.fc=new Chart($('gFc'),{data:{labels:allLabels,datasets:[
      {type:'line',label:'Stvarno',data:histDS,borderColor:'#1a7a34',backgroundColor:'#1a7a341a',fill:true,tension:.35,borderWidth:3,pointRadius:4,pointBackgroundColor:'#1a7a34'},
      {type:'line',label:'Projekcija',data:fcDS,borderColor:'#7c3aed',borderDash:[6,4],tension:.35,borderWidth:3,pointRadius:4,pointBackgroundColor:'#7c3aed',backgroundColor:'#7c3aed12',fill:true}

}
function buildCsat(){
  $('sc-csat').innerHTML=`
    <div class="lead">Ocjene koje građani daju nakon što im je prijava <b>riješena</b>. Ocjenu daje samo dio građana, pa su broj odgovora i raspodjela jednako važni kao prosjek.</div>
    <div class="csat-hero">
      <div class="csat-big"><div class="csat-score">4.1<small>/5</small></div><div class="stars">★★★★☆</div><div class="csat-lbl">Prosječna ocjena (CSAT)</div><div class="csat-meta">312 ocjena · maj 2025</div></div>
      <div class="csat-big"><div class="csat-score" style="color:var(--brand)">+38</div><div class="csat-lbl" style="margin-top:14px">NPS — preporuka</div><div class="csat-meta">% promotera − % kritičara</div></div>
      <div class="csat-big"><div class="csat-score" style="color:var(--blue)">24%</div><div class="csat-lbl" style="margin-top:14px">Stopa odgovora</div><div class="csat-meta">312 od 1.284 riješenih</div></div>

    <div class="grid2b">

      <div class="card"><div class="card-h"><div class="card-t">Zadovoljstvo po službi</div></div><div class="chart-box sm"><canvas id="gCsatSvc"></canvas></div></div>

    <div class="card"><div class="card-h"><div class="card-t">Trend zadovoljstva i stope odgovora</div><div class="card-badge">6 mjeseci</div></div><div class="chart-box"><canvas id="gCsatTrend"></canvas></div></div>`;
  setTimeout(()=>{

    gcharts.ct=new Chart($('gCsatTrend'),{data:{labels:MONTHS,datasets:[{type:'line',label:'CSAT (1–5)',data:CST,borderColor:'#1a7a34',backgroundColor:'#1a7a341a',tension:.35,fill:true,yAxisID:'y',pointRadius:4,borderWidth:3},{type:'line',label:'Stopa odgovora %',data:RAT,borderColor:'#007aff',borderDash:[5,4],tension:.35,yAxisID:'y1',pointRadius:3,borderWidth:2}]},options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:10,usePointStyle:true}}},scales:{y:{min:3,max:5,position:'left',grid:{color:'#0000000a'}},y1:{min:0,max:40,position:'right',grid:{display:false}},x:{grid:{display:false}}}}});
  },40);
}
function buildSvc(){
  $('sc-svc').innerHTML=`
    <div class="lead">Poređenje javnih i komunalnih službi po brzini, obimu i zadovoljstvu. Rangiranje prema SLA poštovanju — udjelu prijava riješenih u dogovorenom roku.</div>
    <div class="card"><div class="tbl-wrap"><table><thead><tr><th>Služba</th><th>Prijave</th><th>Riješeno</th><th>SLA u roku</th><th>Prosj. vrijeme</th><th>Zadovoljstvo</th><th>Status</th></tr></thead>

/* ═══════════ INIT ═══════════ */
function buildSkeleton(){
  $('body').innerHTML=['disp','tasks','sla','map','shifts','perf','analytics','exec','equity','forecast','csat','svc','evidence']
    .map(id=>`<section class="screen${id==='disp'?' on':''}" id="sc-${id}"></section>`).join('');
}
buildSkeleton();
// ── ONLINE: očisti demo naloge/radnike PRIJE prvog crtanja (da se demo nikad ne pojavi) ──
if(location.protocol==='http:'||location.protocol==='https:'){
  ['putevi','voda','elektro','cistoca'].forEach(function(d){if(SVC_DATA[d]){SVC_DATA[d].orders=[];SVC_DATA[d].workers=[];}});
}
renderDispGroup();

/* ═══════════════════════════════════════════════════════════════
   ONLINE MOD — povlači prave prijave i radnike sa PINIT servera.
   Bez servera (otvoren kao fajl) ostaje demo za prezentacije.
   ═══════════════════════════════════════════════════════════════ */
(function(){
const SRV=(location.protocol==='http:'||location.protocol==='https:')?location.origin:'';
if(!SRV)return;

/* ═══ ONLINE ČIŠĆENJE: bez ijednog izmišljenog podatka ═══ */
['putevi','voda','elektro','cistoca'].forEach(d=>{SVC_DATA[d].orders=[];SVC_DATA[d].workers=[];});
renderDispGroup();

window.NODATA='<div class="card" style="text-align:center;padding:38px 26px;color:var(--ink3);font-size:14px;line-height:1.6;"><div style="font-size:32px;margin-bottom:8px;">📊</div><b style="color:var(--ink);">Nedovoljno podataka</b><br>Ovaj ekran se popunjava iz stvarnih prijava i ocjena građana kroz vrijeme.<br><span style="font-size:12px;">Nema ilustrativnih vrijednosti u online modu.</span></div>';

/* Grad ekrani (izvršni, pravednost, prognoze, zadovoljstvo, učinak službi) — izvori još ne postoje na serveru */
window.renderGrad=function(){['sc-exec','sc-equity','sc-forecast','sc-csat','sc-svc'].forEach(id=>{const e=document.getElementById(id);if(e)e.innerHTML=NODATA;});};

/* Učinak radnika: stvarni brojevi (riješeno/aktivno) da, izmišljeni SLA% ne */
const _origPerf=window.renderPerf;
window.renderPerf=function(){
  if(!workers().length){$('sc-perf').innerHTML=window.NODATA;return;}
  _origPerf();
  const e=$('sc-perf');
  e.innerHTML=e.innerHTML
    .replace(/width:null%/g,'width:0%')
    .replace(/>null%</g,'>—<')
    .replace(/<span class="tag bad">Pratiti<\/span>/g,'<span style="color:var(--ink3)">— (nema SLA istorije)</span>');
};

/* Smjene: bez izmišljenog rasporeda — stvarni radnici, sve "Slobodno" dok grad ne postavi */
const SH_REAL={};
const _origShifts=window.renderShifts;
window.renderShifts=function(){
  const ws=workers();
  if(!ws.length){$('sc-shifts').innerHTML=window.NODATA;return;}
  SH_REAL[activeSvc]=SH_REAL[activeSvc]||{};
  SHIFTS[activeSvc]=ws.map(w=>{ if(!SH_REAL[activeSvc][w.id])SH_REAL[activeSvc][w.id]=['O','O','O','O','O','O','O']; return SH_REAL[activeSvc][w.id]; });
  _origShifts();
};

// V5 kategorije → odjel Platforme
const CAT2DEPT={putevi:'putevi',voda:'voda',poplava:'voda',rasveta:'elektro',elektro:'elektro',otpad:'cistoca',predmet:'putevi',staklo:'putevi',ostalo:'putevi'};
const STATUS2ST=['new','prog','prog','done'];   // server 0-3 → platform
const ST2STATUS={new:1,prog:2,done:3};
const DEFSLA={urgent:4,med:24,low:72};
/* Rok po VRSTI kvara (sati) — hitna opasnost odmah, rupe 72 h, otpad 48 h, rasvjeta 7 dana.
   Hitan prioritet (puno potvrda građana) prepolovi rok. Isto kao na serveru. */
const SLA_CAT={staklo:4,poplava:12,voda:24,predmet:24,putevi:72,otpad:48,rasveta:168,rasvjeta:168,elektro:168,ostalo:72};
function slaFor(cat,pri){var b=SLA_CAT[String(cat||'').toLowerCase()]||72;return pri==='urgent'?Math.max(2,Math.round(b/2)):b;}
let WORKERS=[],lastSig='';

// prioritet iz glasova ako grad nije postavio
function autoPri(r){ if(r.pri)return r.pri; const v=r.votes||0; return v>=25?'urgent':v>=10?'med':'low'; }

function mapReport(r){
  const dept=CAT2DEPT[r.cat]||'putevi';
  const pri=autoPri(r);
  return {id:'R-'+r.id, _srvId:r.id, cat:(SVC_DATA[dept].cats[r.cat]?r.cat:Object.keys(SVC_DATA[dept].cats)[0]),
    _origCat:r.cat, addr:(r.lat!=null?r.lat.toFixed(5)+', '+r.lng.toFixed(5):'bez lokacije'),
    lat:r.lat,lng:r.lng, zone:'', status:STATUS2ST[r.status]||'new', pri,
    votes:r.votes||0, note:r.note||'', citizen:r.name||'anonimno', ts:r.ts||Date.now(),
    worker:r.worker||null, cost:r.cost||null, sla:(r.sla||slaFor(r.cat,pri)), photo:r.photo||null, _dept:dept,
    _recurOf:r.recurOf||null, _recurDays:r.recurDays||null,
    _recurConfirmed:(r.recurConfirmed==null?null:r.recurConfirmed), _rating:r.rating||null};
}

function distribute(reports){
  ['putevi','voda','elektro','cistoca'].forEach(d=>{SVC_DATA[d].orders=[];SVC_DATA[d].workers=[];});
  reports.forEach(r=>{const m=mapReport(r);SVC_DATA[m._dept].orders.push(m);});
  ['putevi','voda','elektro','cistoca'].forEach(d=>{
    SVC_DATA[d].orders.sort((a,b)=>b.ts-a.ts);
    SVC_DATA[d].workers=WORKERS.filter(w=>w.dept===d).map(w=>{
      const act=SVC_DATA[d].orders.filter(o=>o.worker===w.id&&o.status!=='done').length;
      const done=SVC_DATA[d].orders.filter(o=>o.worker===w.id&&o.status==='done').length;
      const gpsFresh=w.locTs&&(Date.now()-w.locTs<120000); // GPS mlađi od 2 min = uživo
      const loc=gpsFresh?('📡 '+w.lat.toFixed(4)+', '+w.lng.toFixed(4)+' (uživo)'):(act>0?'na terenu':'Baza');
      return {id:w.id,name:w.name,role:w.role,av:w.av,bg:gpsFresh?'#e8f5ec':'#eef2f7',tc:gpsFresh?'#0f4f21':'#334155',
        status:act>0?'busy':'free',tasks:act,done,sla:null,loc,_lat:gpsFresh?w.lat:null,_lng:gpsFresh?w.lng:null};
    });
  });
}

function pull(){
  Promise.all([
    fetch(SRV+'/api/reports').then(r=>r.json()).catch(()=>null),
    fetch(SRV+'/api/workers').then(r=>r.json()).catch(()=>null)
  ]).then(([reports,workers])=>{
    // ako fetch zakaže (server se budi), tretiraj kao prazno — nikad ne ostavljaj demo
    WORKERS=Array.isArray(workers)?workers:[];
    const rep=Array.isArray(reports)?reports:[];
    const sig=JSON.stringify(rep.map(r=>[r.id,r.status,r.worker,r.votes,r.rating,r.recurConfirmed]))+JSON.stringify(WORKERS.map(w=>w.id));
    if(sig===lastSig)return; lastSig=sig;
    distribute(rep);
    if(typeof renderDispGroup==='function')renderDispGroup();
    if(current==='exec'||current==='equity'||current==='forecast'||current==='csat'||current==='svc')
      { if(typeof renderGrad==='function')renderGrad(); }
    cleanAnalytics();
  });
}

/* dodjela / status → server, pa lokalno */
window.assign=function(oid,wid){
  const o=getO(oid);if(!o)return;
  fetch(SRV+'/api/reports/'+o._srvId,{method:'PATCH',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({worker:wid,status:2})}).then(()=>{lastSig='';pull();
    if(typeof closeModal==='function')closeModal();
    const w=(WORKERS.find(x=>x.id===wid)||{}).name||'';toast('✓ Dodijeljeno serveru: '+w);}).catch(()=>toast('Greška'));
};
window.markDone=function(oid){
  const o=getO(oid);if(!o)return;
  fetch(SRV+'/api/reports/'+o._srvId,{method:'PATCH',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({status:3})}).then(()=>{lastSig='';pull();toast('✓ Riješeno — građanin vidi u aplikaciji');}).catch(()=>toast('Greška'));
};
window.setStat=function(oid,st){
  const o=getO(oid);if(!o)return;
  fetch(SRV+'/api/reports/'+o._srvId,{method:'PATCH',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({status:ST2STATUS[st]||1})}).then(()=>{lastSig='';pull();}).catch(()=>{});
};

/* označi analitiku koja nema stvaran izvor podataka */
function cleanAnalytics(){/* online: Grad ekrani su placeholder umjesto ilustracija */}

/* radnici — dodavanje preko forme */
window.pinitAddWorker=function(){
  const dept=activeSvc;
  const name=prompt('Ime i prezime radnika:');if(!name)return;
  const role=prompt('Uloga (npr. Asfalter, Vodoinstalater):','Terenac')||'Terenac';
  fetch(SRV+'/api/workers',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,role,dept})}).then(r=>r.json()).then(()=>{lastSig='';pull();toast('➕ Radnik dodan: '+name);}).catch(()=>toast('Greška'));
};

// dugme "Dodaj radnika" u zaglavlju kad si na mapi radnika
const origNav=window.nav;
window.nav=function(id,btn){origNav(id,btn);setTimeout(injectWorkerBtn,30);};
function injectWorkerBtn(){
  if(current!=='map')return;
  const sc=document.getElementById('sc-map');if(!sc||sc.querySelector('#addWk'))return;
  const b=document.createElement('button');b.id='addWk';b.className='btn';b.textContent='➕ Dodaj radnika';
  b.style.cssText='margin-bottom:14px;';b.onclick=pinitAddWorker;
  sc.insertBefore(b,sc.firstChild);
}

pull();
setInterval(pull,12000);
})();

<script>
/* ═══ PINIT — STVARNA GRADSKA ANALITIKA (online) ═══
   Zamjenjuje "Grad" ekrane (Izvršni/Pravednost/Prognoze/Zadovoljstvo/Službe)
   panelom koji se računa ISKLJUČIVO iz stvarnih prijava sa servera.
   Prikazuje samo statistiku za koju ima podataka; ostalo se pojavi kad prijave stignu. */
(function(){'use strict';
if(!(location.protocol==='http:'||location.protocol==='https:'))return; // demo (file://) ostaje netaknut
var SRV=location.origin;
var GRAD_IDS=['exec','equity','forecast','csat','svc','evidence'];
var state={reports:[],cur:null};

var CATMETA={
  putevi:{n:'Putevi / rupe',c:'#f59000'}, rupe:{n:'Putevi / rupe',c:'#f59000'}, rupa:{n:'Putevi / rupe',c:'#f59000'},
  otpad:{n:'Otpad / smeće',c:'#16a34a'}, smece:{n:'Otpad / smeće',c:'#16a34a'}, cistoca:{n:'Otpad / smeće',c:'#16a34a'},
  voda:{n:'Curenje / cijev',c:'#0891b2'}, curenje:{n:'Curenje / cijev',c:'#0891b2'},
  rasveta:{n:'Rasvjeta',c:'#e24b4a'}, rasvjeta:{n:'Rasvjeta',c:'#e24b4a'},
  predmet:{n:'Predmet na putu',c:'#7c3aed'},
  staklo:{n:'Staklo / opasnost',c:'#db2777'},
  poplava:{n:'Poplava / kanal',c:'#38bdf8'},
  ostalo:{n:'Ostalo',c:'#64748b'}
};
var PALETTE=['#f59000','#16a34a','#0891b2','#e24b4a','#7c3aed','#0d9488','#d946ef','#64748b'];
var STAT=['Čeka','Obaviještena služba','U toku','Riješeno'];
var STATCOL=['#94a3b8','#2563eb','#f59e0b','#1a7a34'];

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function catMeta(cat,i){var k=String(cat||'').toLowerCase();return CATMETA[k]||{n:(cat?esc(cat):'Nepoznato'),c:PALETTE[i%PALETTE.length]};}
function monthKey(ts){var d=new Date(ts);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function monthLbl(k){var m=['jan','feb','mar','apr','maj','jun','jul','avg','sep','okt','nov','dec'];var p=k.split('-');return m[(+p[1])-1]+' '+p[0].slice(2);}

function compute(R){
  var total=R.length;
  var byStat=[0,0,0,0];
  var cats={};
  var months={};
  var resolved=0, resDaysSum=0, resDaysN=0, backlog30=0;
  var now=Date.now(), D30=30*864e5;
  R.forEach(function(r){
    var st=(typeof r.status==='number')?r.status:0; if(st<0||st>3)st=0;
    byStat[st]++;
    var ck=String(r.cat||'ostalo').toLowerCase(); cats[ck]=(cats[ck]||0)+1;
    var ts=r.ts||r.created||now; var mk=monthKey(ts); months[mk]=months[mk]||{rep:0,res:0}; months[mk].rep++;
    if(st===3){ resolved++;
      var rat=r.resolvedAt||((r.history&&r.history.length)?r.history[r.history.length-1].t:null);
      if(rat){ var mk2=monthKey(rat); months[mk2]=months[mk2]||{rep:0,res:0}; months[mk2].res++;
        var dd=(rat-ts)/864e5; if(dd>=0){resDaysSum+=dd;resDaysN++;} }
    } else if((now-ts)>D30){ backlog30++; }
  });
  return {total:total,byStat:byStat,cats:cats,months:months,resolved:resolved,
    inProgress:byStat[1]+byStat[2],waiting:byStat[0],backlog30:backlog30,
    avgResDays:resDaysN?(resDaysSum/resDaysN):null};
}

function kpi(lbl,val,sub,col){
  return '<div class="kpi"><div class="kpi-lbl">'+lbl+'</div><div class="kpi-val"'+(col?' style="color:'+col+'"':'')+'>'+val+'</div><div class="kpi-s" style="font-size:11.5px;font-weight:600;margin-top:8px;color:var(--ink3)">'+(sub||'')+'</div></div>';
}
function barRows(items,total){ // items:[{n,v,c}]
  var max=Math.max.apply(null,items.map(function(x){return x.v;}).concat([1]));
  return items.map(function(x){
    var pct=total?Math.round(x.v/total*100):0;
    return '<div style="display:flex;align-items:center;gap:10px;padding:5px 0">'+
      '<span style="width:140px;font-size:12.5px;font-weight:600">'+x.n+'</span>'+
      '<div style="flex:1;height:14px;border-radius:7px;background:var(--surface-2,#f2f2f7);overflow:hidden"><i style="display:block;height:100%;width:'+(x.v/max*100)+'%;background:'+x.c+';border-radius:7px"></i></div>'+
      '<span style="width:72px;text-align:right;font-size:12px;font-variant-numeric:tabular-nums"><b>'+x.v+'</b> · '+pct+'%</span></div>';
  }).join('');
}
function card(title,badge,inner){
  return '<div class="card"><div class="card-h"><div class="card-t">'+title+'</div>'+(badge?'<div class="badge">'+badge+'</div>':'')+'</div>'+inner+'</div>';
}

// Prostorno klasterisanje (DBSCAN-lite): grupiše prijave iste vrste unutar radiusa =
// istovremeno deduplikacija (spajanje duplikata) i "crne tačke" (žarišta). Sve iz stvarnih prijava.
function hvd(a,b){var R=6371000,r=Math.PI/180,dLa=(b.lat-a.lat)*r,dLo=(b.lng-a.lng)*r;var q=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLo/2)*Math.sin(dLo/2);return 2*R*Math.asin(Math.sqrt(q));}
function hotspots(R,radius){
  radius=radius||80;
  var pts=R.filter(function(r){return typeof r.lat==='number'&&typeof r.lng==='number'&&!isNaN(r.lat)&&!isNaN(r.lng);});
  var used=[],clusters=[];
  for(var i=0;i<pts.length;i++){
    if(used[i])continue;
    var ci=String(pts[i].cat||'ostalo').toLowerCase();
    var members=[i];used[i]=true;
    for(var j=i+1;j<pts.length;j++){
      if(used[j])continue;
      if(String(pts[j].cat||'ostalo').toLowerCase()!==ci)continue;
      if(hvd(pts[i],pts[j])<=radius){members.push(j);used[j]=true;}
    }
    var openN=0;members.forEach(function(m){if((pts[m].status||0)<3)openN++;});
    clusters.push({count:members.length,cat:ci,lat:pts[i].lat,lng:pts[i].lng,open:openN});
  }
  clusters.sort(function(a,b){return b.count-a.count;});
  return {clusters:clusters,located:pts.length};
}

/* ══════════════════════════════════════════════════════════════════════
   GRADSKA ANALITIKA — pet različitih ekrana iz stvarnih prijava.
   Svaki ekran odgovara na svoje pitanje; ništa se ne izmišlja.
   ══════════════════════════════════════════════════════════════════════ */
var DEPT_OF={putevi:'putevi',rupe:'putevi',rupa:'putevi',staklo:'putevi',predmet:'putevi',
  voda:'voda',poplava:'voda',curenje:'voda',
  rasveta:'elektro',rasvjeta:'elektro',elektro:'elektro',
  otpad:'cistoca',smece:'cistoca',cistoca:'cistoca',ostalo:'putevi'};
var DEPT_NAME={putevi:'JKP Putevi',voda:'JKP Vodovod',elektro:'JP Elektroprivreda',cistoca:'JKP Čistoća'};
var DEPT_COL={putevi:'#f59000',voda:'#0891b2',elektro:'#e24b4a',cistoca:'#16a34a'};
function deptOf(cat){return DEPT_OF[String(cat||'').toLowerCase()]||'putevi';}

/* ── PONAVLJANJE KVAROVA ──
   Server označi novu prijavu kao ponavljanje kad se isti tip kvara vrati
   na istu lokaciju (≤120 m) nakon što je već bio označen riješenim.
   Radnik na terenu potvrđuje da je stvarno isti kvar — tek potvrđeno
   ponavljanje znači da popravka nije izdržala. */
function recurStats(R){
  var flagged=R.filter(function(r){return r.recurOf;});
  var confirmed=flagged.filter(function(r){return r.recurConfirmed===true;});
  var rejected=flagged.filter(function(r){return r.recurConfirmed===false;});
  var pending=flagged.filter(function(r){return r.recurConfirmed==null;});
  var daysArr=confirmed.map(function(r){return r.recurDays;}).filter(function(d){return d>0;});
  var avgDays=daysArr.length?daysArr.reduce(function(a,b){return a+b;},0)/daysArr.length:null;
  var resolvedTot=R.filter(function(r){return r.status===3;}).length;
  // po kategoriji
  var byCat={};
  confirmed.forEach(function(r){var k=String(r.cat||'ostalo').toLowerCase();byCat[k]=(byCat[k]||0)+1;});
  // po službi
  var byDept={};
  confirmed.forEach(function(r){var d=deptOf(r.cat);byDept[d]=(byDept[d]||0)+1;});
  // lokacije koje se ponavljaju više puta
  var spots={};
  confirmed.forEach(function(r){
    if(typeof r.lat!=='number')return;
    var k=r.lat.toFixed(3)+','+r.lng.toFixed(3)+'|'+String(r.cat).toLowerCase();
    spots[k]=spots[k]||{cat:r.cat,lat:r.lat,lng:r.lng,n:0,days:[]};
    spots[k].n++; if(r.recurDays)spots[k].days.push(r.recurDays);
  });
  var repeatSpots=Object.keys(spots).map(function(k){return spots[k];})
    .sort(function(a,b){return b.n-a.n;});
  return {flagged:flagged,confirmed:confirmed,rejected:rejected,pending:pending,
    avgDays:avgDays,resolvedTot:resolvedTot,byCat:byCat,byDept:byDept,repeatSpots:repeatSpots,
    rate:resolvedTot?(confirmed.length/resolvedTot*100):0};
}

/* zone: mreža ~1 km (bez zvaničnih granica zona ovo je najpoštenija podjela) */
function zonesOf(R){
  var z={};
  R.forEach(function(r){
    if(typeof r.lat!=='number'||typeof r.lng!=='number')return;
    var la=Math.round(r.lat/0.009), lo=Math.round(r.lng/(0.009/Math.max(0.2,Math.cos(r.lat*Math.PI/180))));
    var k=la+':'+lo;
    z[k]=z[k]||{k:k,lat:r.lat,lng:r.lng,n:0,res:0,days:[],open:0};
    z[k].n++;
    if(r.status===3){z[k].res++;
      var rt=r.resolvedAt; if(rt)z[k].days.push((rt-(r.ts||rt))/864e5);
    } else z[k].open++;
  });
  var list=Object.keys(z).map(function(k){var o=z[k];
    o.avgDays=o.days.length?o.days.reduce(function(a,b){return a+b;},0)/o.days.length:null;
    o.rate=o.n?Math.round(o.res/o.n*100):0; return o;});
  list.sort(function(a,b){return b.n-a.n;});
  list.forEach(function(o,i){o.name='Zona '+String.fromCharCode(65+Math.floor(i/9))+((i%9)+1);});
  return list;
}

/* ══ 2. PRAVEDNOST PO ZONAMA ══ */
function renderEquityCity(box,R,s){
  var Z=zonesOf(R);

  if(!Z.length){box.innerHTML=html+lockNote('Nijedna prijava još nema GPS lokaciju, pa se zone ne mogu izračunati.');return;}
  var withDays=Z.filter(function(z){return z.avgDays!=null;});
  if(withDays.length>=2){
    var best=withDays.slice().sort(function(a,b){return a.avgDays-b.avgDays;})[0];
    var worst=withDays.slice().sort(function(a,b){return b.avgDays-a.avgDays;})[0];
    var gap=(worst.avgDays-best.avgDays);
    html+='<div class="kpi-row" style="margin-bottom:16px">'+
      kpi('Zona s najbržom uslugom',best.name,best.avgDays.toFixed(1)+' dana prosječno','var(--brand,#1a7a34)')+
      kpi('Zona koja najduže čeka',worst.name,worst.avgDays.toFixed(1)+' dana prosječno','var(--red,#ff3b30)')+

    '</div>';
  }
  var rows=Z.slice(0,12).map(function(z){
    var barW=Math.round(z.rate);
    return '<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--sep,#f0f0f3)">'+
      '<span style="width:64px;font-size:12.5px;font-weight:700">'+z.name+'</span>'+
      '<span style="width:96px;font-size:11.5px;color:var(--ink3)">'+z.lat.toFixed(3)+', '+z.lng.toFixed(3)+'</span>'+
      '<span style="width:70px;font-size:12.5px"><b>'+z.n+'</b> prijava</span>'+
      '<div style="flex:1;height:12px;border-radius:6px;background:var(--surface-2,#f2f2f7);overflow:hidden;min-width:60px"><i style="display:block;height:100%;width:'+barW+'%;background:'+(z.rate>=70?'#1a7a34':z.rate>=40?'#ff9500':'#ff3b30')+'"></i></div>'+
      '<span style="width:44px;text-align:right;font-size:12px;font-variant-numeric:tabular-nums">'+z.rate+'%</span>'+
      '<span style="width:78px;text-align:right;font-size:12px;color:var(--ink3)">'+(z.avgDays!=null?z.avgDays.toFixed(1)+' dana':'—')+'</span>'+
    '</div>';}).join('');

  html+='<div class="note" style="margin-top:4px"><svg viewBox="0 0 24 24"><path d="M12 2L2 7v7c0 5 3.4 9.7 10 11 6.6-1.3 10-6 10-11V7L12 2z"/></svg><div><div class="note-t">Kako čitati</div><div class="note-b">Zone su mreža ~1 km jer grad još nije dao zvanične granice mjesnih zajednica. Manje prijava u zoni <b>ne znači</b> manje problema — može značiti da tamo ljudi manje prijavljuju. Zato je brzina rješavanja pošteniji pokazatelj od broja prijava. Za prijave po glavi stanovnika treba popis stanovništva po zonama.</div></div></div>';
  box.innerHTML=html;
}

/* ══ 3. PROGNOZE I PREDVIĐANJA ══ */

/* ══ 4. ZADOVOLJSTVO GRAĐANA ══ */

  '</div>';
  var dist=[5,4,3,2,1].map(function(v){
    var n=rated.filter(function(r){return r.rating===v;}).length;

  html+=card('Raspodjela ocjena','stvarne ocjene',barRows(dist,rated.length));
  // po službi
  var byD={};

/* ══ 5. UČINAK SLUŽBI ══ */
function renderSvcCity(box,R,s){
  var rc=recurStats(R);

  var byD={};

    else if((Date.now()-(r.ts||Date.now()))>30*864e5)byD[d].open30++;
    if(r.rating)byD[d].rat.push(r.rating);

    var avgR=o.rat.length?(o.rat.reduce(function(a,b){return a+b;},0)/o.rat.length):null;

      '<td style="padding:9px 6px;font-weight:600;font-size:13px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+DEPT_COL[d]+';margin-right:7px"></span>'+DEPT_NAME[d]+'</td>'+

      '<td style="padding:9px 6px;text-align:right;font-weight:700;color:'+(o.recur?'#ff3b30':'var(--ink3)')+'">'+(o.recur||'0')+'</td>'+

    '</tr>';}).join('');
  html+=card('Tabela učinka','sve iz stvarnih prijava',
    '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px">'+
    '<thead><tr style="color:var(--ink3);font-size:11px;text-transform:uppercase;letter-spacing:.04em">'+
    '<th style="text-align:left;padding:6px">Služba</th><th style="text-align:right;padding:6px">Zaprimljeno</th>'+
    '<th style="text-align:right;padding:6px">Riješeno</th><th style="text-align:right;padding:6px">Stopa</th>'+
    '<th style="text-align:right;padding:6px">Prosj.</th><th style="text-align:right;padding:6px">Vratilo se</th>'+
    '<th style="text-align:right;padding:6px">Ocjena</th><th style="text-align:right;padding:6px">&gt;30 d</th></tr></thead>'+
    '<tbody>'+rows+'</tbody></table></div>'+
    '<div style="margin-top:10px;font-size:11.5px;color:var(--ink3);line-height:1.5"><b>Vratilo se</b> = popravke koje su pale i radnik je to potvrdio. <b>Ocjena</b> = prosjek ocjena građana. Prazno (—) znači da podatak još ne postoji, ne da je nula.</div>');
  if(rc.confirmed.length){
    var dr=Object.keys(rc.byDept).map(function(d,i){return {n:DEPT_NAME[d],v:rc.byDept[d],c:DEPT_COL[d]};})
      .sort(function(a,b){return b.v-a.v;});
    html+=card('Ponovljeni kvarovi po službi','potvrđeno na terenu',barRows(dr,rc.confirmed.length));
  }
  box.innerHTML=html;
}

/* ══ 6. REGISTAR DOKAZA POSTUPANJA (pravna zaštita grada) ══
   Svaka prijava nosi nepromjenjiv trag: kada je grad SAZNAO za kvar, kada je
   služba obaviještena, kada su radovi izvršeni i s kojim foto dokazom.
   Pravni okvir: Zakon o cestama FBiH čl. 20 (upravitelj nadoknađuje štetu zbog
   nedostataka na cesti), Zakon o javnim putevima RS (odgovornost zbog propuštanja
   blagovremenog održavanja), ZOO čl. 154 (odgovornost osim ako dokaže da nije kriv),
   čl. 172 (odgovornost pravnog lica), čl. 173/174 (opasna stvar/djelatnost).
   Ovaj registar radi u oba smjera: dokazuje da je grad postupio u roku — ili
   upozorava da za poznati kvar rok ističe, dok se šteta još može spriječiti. */
function evidenceRows(R){
  return R.map(function(r){
    var h=r.history||[];
    var known=r.ts||null;                                   // grad saznao
    var notified=null,started=null;
    h.forEach(function(x){
      if(x.status===1&&!notified)notified=x.t;
      if(x.status===2&&!started)started=x.t;
    });
    var done=r.resolvedAt||null;
    var sla=r.sla||72;
    var elapsedH=(( (done||Date.now()) - known)/3600e3);
    var inSla=done? (elapsedH<=sla) : null;
    var overdue=!done && elapsedH>sla;
    return {r:r,known:known,notified:notified,started:started,done:done,sla:sla,
      elapsedH:elapsedH,inSla:inSla,overdue:overdue,
      proof:!!(r.photoBefore&&r.photoAfter),photoCit:!!r.photo};
  });
}
function fmtDT(t){ if(!t)return '—';
  var d=new Date(t);
  return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear()+
    '. u '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function renderEvidenceCity(box,R,s){
  var E=evidenceRows(R);
  var closed=E.filter(function(e){return e.done;});
  var inSla=closed.filter(function(e){return e.inSla;});
  var overdue=E.filter(function(e){return e.overdue;});
  var withProof=closed.filter(function(e){return e.proof;});
  var html=leadTxt('Za svaku prijavu čuva se <b>nepromjenjiv trag</b>: kada je grad saznao za kvar, kada je služba obaviještena, kada su radovi izvršeni i s kojim foto dokazom. Ovo je dokaz da je grad postupio — ili rano upozorenje da rok ističe.');

  html+='<div class="kpi-row" style="margin-bottom:16px">'+
    kpi('Zatvoreno s dokazom',withProof.length+'<small>/'+closed.length+'</small>','foto prije i poslije','var(--brand,#1a7a34)')+
    kpi('Riješeno u roku',(closed.length?Math.round(inSla.length/closed.length*100):0)+'%',inSla.length+' od '+closed.length+' prijava')+
    kpi('Rok istekao — otvoreno',overdue.length,'pravni rizik sada',overdue.length?'var(--red,#ff3b30)':null)+
    kpi('Prosj. do popravke',(closed.length?(closed.reduce(function(a,e){return a+e.elapsedH;},0)/closed.length/24).toFixed(1):'—')+'<small> dana</small>','od saznanja do izvršenja')+
  '</div>';

  /* Najhitnije: otvoreni kvarovi kojima je rok istekao = grad zna, a nije riješio */
  if(overdue.length){
    var orows=overdue.sort(function(a,b){return b.elapsedH-a.elapsedH;}).slice(0,8).map(function(e,i){
      var m=catMeta(e.r.cat,i);
      var days=(e.elapsedH/24).toFixed(1);
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--sep,#f0f0f3)">'+
        '<span style="width:9px;height:9px;border-radius:50%;background:#ff3b30;flex-shrink:0"></span>'+
        '<span style="flex:1;font-size:13px;font-weight:600">'+m.n+'</span>'+
        '<span style="font-size:11.5px;color:var(--ink3);width:130px">'+(e.r.lat!=null?e.r.lat.toFixed(4)+', '+e.r.lng.toFixed(4):'bez lokacije')+'</span>'+
        '<span style="font-size:12px;width:110px;text-align:right;color:var(--ink3)">saznali '+fmtDT(e.known).split(' u ')[0]+'</span>'+
        '<span style="font-size:12.5px;width:96px;text-align:right;color:#ff3b30;font-weight:700">'+days+' d · rok '+e.sla+'h</span>'+
      '</div>';}).join('');
    html+=card('Rok istekao — grad zna, a nije riješeno','djeluj odmah',
      '<div style="font-size:12.5px;color:var(--ink3);margin-bottom:6px">Ovo su prijave gdje je rok prošao, a kvar je i dalje otvoren. Dok je otvoreno, <b>šteta se još može spriječiti</b> — a svaki dan odgode otežava pravnu poziciju grada.</div>'+orows);
  }else{
    html+=card('Rok istekao','',
      '<div style="padding:12px 2px;color:var(--ink3);font-size:13px">Nijedna otvorena prijava nije prekoračila rok. Ovo je stanje koje grad želi pokazati.</div>');
  }

  /* Kronologija zadnjih zatvorenih — spremno za ispis */
  if(closed.length){
    var crows=closed.sort(function(a,b){return b.done-a.done;}).slice(0,10).map(function(e,i){
      var m=catMeta(e.r.cat,i);
      var days=(e.elapsedH/24).toFixed(1);
      return '<div style="padding:11px 0;border-bottom:1px solid var(--sep,#f0f0f3)">'+
        '<div style="display:flex;align-items:center;gap:9px;margin-bottom:5px">'+
          '<span style="width:8px;height:8px;border-radius:50%;background:'+m.c+'"></span>'+
          '<b style="font-size:13px">'+m.n+'</b>'+
          '<span style="font-size:11px;color:var(--ink3)">#'+e.r.id+'</span>'+
          '<span style="margin-left:auto;font-size:11.5px;font-weight:700;color:'+(e.inSla?'#1a7a34':'#ff3b30')+'">'+
            (e.inSla?'u roku':'prekoračen rok')+' · '+days+' d</span>'+
        '</div>'+
        '<div style="font-size:11.5px;color:var(--ink3);line-height:1.6">'+
          'Grad saznao: <b style="color:var(--ink)">'+fmtDT(e.known)+'</b>'+
          (e.notified?' &nbsp;·&nbsp; služba obaviještena: '+fmtDT(e.notified):'')+
          (e.started?' &nbsp;·&nbsp; radovi počeli: '+fmtDT(e.started):'')+
          ' &nbsp;·&nbsp; izvršeno: <b style="color:var(--ink)">'+fmtDT(e.done)+'</b>'+
        '</div>'+
        '<div style="font-size:11.5px;margin-top:4px;color:var(--ink3)">'+
          'Dokaz: '+(e.proof?'<b style="color:#1a7a34">foto prije i poslije</b>':'<b style="color:#ff9500">nepotpun — nedostaje foto prije/poslije</b>')+
          (e.photoCit?' · foto građanina':'')+
          (e.r.cost?' · trošak '+e.r.cost+' KM':'')+
          (e.r.rating?' · ocjena građanina '+e.r.rating+'/5':'')+
        '</div>'+
      '</div>';}).join('');
    html+=card('Kronologija izvršenih radova','zadnjih '+Math.min(10,closed.length),
      '<div style="font-size:12.5px;color:var(--ink3);margin-bottom:4px">Svaki red je zaokružen dokaz postupanja za jednu prijavu — spremno za ispis i prilaganje.</div>'+crows+
      '<button class="btn" style="margin-top:12px" onclick="window.print()">Ispiši registar</button>');
  }

  html+='<div class="note" style="margin-top:4px"><svg viewBox="0 0 24 24"><path d="M12 2L2 7v7c0 5 3.4 9.7 10 11 6.6-1.3 10-6 10-11V7L12 2z"/></svg><div><div class="note-t">Zašto je ovo važno gradu</div><div class="note-b">Odgovornost upravitelja puta ovisi o tome je li <b>znao za kvar</b> i je li <b>blagovremeno postupio</b> — <i>Zakon o cestama FBiH, član 20</i>; <i>Zakon o javnim putevima RS</i> (odgovornost zbog propuštanja blagovremenog održavanja); <i>ZOO čl. 154, 172, 173/174</i>. Ovaj registar daje tačan datum saznanja, dokaz postupanja i foto dokaz izvršenja. Napomena: nadležnost za lokalne i nerazvrstane ceste je na općini/gradu — konkretne članove neka potvrdi pravna služba grada.</div></div></div>';
  box.innerHTML=html;
}

function renderCity(){
  if(GRAD_IDS.indexOf(state.cur)<0)return;
  var box=document.getElementById('sc-'+state.cur); if(!box)return;
  var R=state.reports, s=compute(R);
  if(!s.total){emptyCity(box);return;}
  if(state.cur==='exec')return renderExecCity(box,R,s);
  if(state.cur==='equity')return renderEquityCity(box,R,s);
  if(state.cur==='forecast')return renderForecastCity(box,R,s);
  if(state.cur==='csat')return renderCsatCity(box,R,s);
  if(state.cur==='svc')return renderSvcCity(box,R,s);
  if(state.cur==='evidence')return renderEvidenceCity(box,R,s);
}
/* pull() je ranije crtao "nema podataka" preko ovih ekrana — sada ide na stvarnu analitiku */
window.renderGrad=function(){renderCity();};

// Presretni navigaciju: kad se otvori neki "Grad" ekran, ucrtaj stvarni panel
var _nav=window.nav;
window.nav=function(id,btn){ if(typeof _nav==='function')_nav(id,btn); state.cur=id; if(GRAD_IDS.indexOf(id)>=0)setTimeout(renderCity,0); };

// Povuci prijave i drži svježe; kad smo na Grad ekranu, prepiši stvarnim panelom
function pullReports(){
  fetch(SRV+'/api/reports').then(function(r){return r.json();}).then(function(list){
    state.reports=Array.isArray(list)?list:[];
    if(GRAD_IDS.indexOf(state.cur)>=0)renderCity();
  }).catch(function(){});
}
pullReports();
setInterval(pullReports,12000);
// Osiguraj da naš panel ostane na vrhu i ako platformin interni render prepiše ekran
setInterval(function(){ if(GRAD_IDS.indexOf(state.cur)>=0)renderCity(); },4000);
})();
</script>
